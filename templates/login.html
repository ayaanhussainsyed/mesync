<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login · MeSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e8e4db;
    --fg-soft: #c9c4b8;
    --muted: #6b665d;
    --accent: #c9a96a;
    --card: #141414;
    --border: #1c1c1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Lora', serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  .center {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    animation: rise 500ms cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .brand {
    text-align: center;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 40px;
  }

  .title {
    font-size: 22px;
    color: var(--fg-soft);
    margin-bottom: 8px;
    font-weight: 400;
    letter-spacing: -0.01em;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }
  .label {
    display: block;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-style: italic;
  }
  .input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 14px 16px;
    color: var(--fg);
    font-family: 'Lora', serif;
    font-size: 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 200ms ease;
  }
  .input:focus {
    border-color: var(--accent);
  }
  .input::placeholder {
    color: #454036;
    font-style: italic;
  }

  .btn {
    width: 100%;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 12px 24px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 180ms ease;
    margin-top: 8px;
  }
  .btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .link {
    text-align: center;
    margin-top: 24px;
    color: var(--muted);
    font-size: 13px;
  }
  .link a {
    color: var(--fg-soft);
    text-decoration: none;
    transition: color 180ms ease;
  }
  .link a:hover {
    color: var(--accent);
  }

  .error {
    background: var(--card);
    border: 1px solid #5c2a2a;
    color: #e8a0a0;
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="center">
  <div class="card">
    <div class="brand">MeSync</div>

    <h1 class="title">Welcome back</h1>
    <p class="subtitle">Sign in to continue</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          {% if category == 'error' %}
            <div class="error">{{ message }}</div>
          {% endif %}
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/">
      <div class="form-group">
        <label class="label">Username</label>
        <input type="text" name="username" class="input" placeholder="Enter your username" required>
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input type="password" name="password" class="input" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Continue →</button>
    </form>

    <p class="link">Don't have an account? <a href="/sign-up">Sign up</a></p>
  </div>
</div>

</body>
</html>
