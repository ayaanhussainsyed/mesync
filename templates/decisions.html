<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decision Simulator · MeSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a; --fg: #e8e4db; --fg-soft: #c9c4b8; --muted: #6b665d;
    --accent: #c9a96a; --accent-soft: #a88a4f;
    --card: #141414; --border: #1c1c1c; --danger: #c96a6a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }
  html, body {
    background: var(--bg); color: var(--fg); font-family: 'Lora', serif;
    font-weight: 400; min-height: 100vh; overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(rgba(201,169,106,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse at center, black 25%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 25%, transparent 85%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 500px 400px at 15% 85%, rgba(201,169,106,0.08), transparent 70%),
      radial-gradient(ellipse 500px 400px at 85% 15%, rgba(201,169,106,0.06), transparent 70%);
  }
  main { position: relative; z-index: 10; }

  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .brand-icon {
    width: 28px; height: 28px; color: var(--accent);
  }
  .brand-name {
    font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  }
  nav { display: flex; align-items: center; gap: 6px; }
  nav a {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 8px 14px; border-radius: 4px; transition: color 0.2s;
  }
  nav a svg { width: 15px; height: 15px; }
  nav a:hover { color: var(--fg-soft); }
  nav a[aria-current="page"] { color: var(--accent); }
  nav a.btn-logout {
    color: var(--muted); margin-left: 8px;
    padding: 8px 14px; border-radius: 4px; transition: color 0.2s;
  }
  nav a.btn-logout:hover { color: #c96a6a; }

  main {
    padding: 100px 32px 60px;
    max-width: 1160px; margin: 0 auto;
  }

  .page-header { margin-bottom: 24px; text-align: center; }
  .page-title {
    font-size: 30px; font-style: italic; color: var(--accent);
    font-weight: 400; letter-spacing: -0.01em;
  }
  .page-subtitle {
    color: var(--muted); font-size: 13px; font-style: italic;
    margin-top: 6px; max-width: 520px; margin-left: auto; margin-right: auto;
  }

  .input-row {
    display: flex; gap: 10px; margin-bottom: 16px; align-items: stretch;
    padding: 14px 16px;
    background: rgba(20,20,20,0.62);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 12px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(201,169,106,0.35); }
  .input {
    flex: 1; background: transparent; border: none;
    color: var(--fg); padding: 8px 10px; border-radius: 6px;
    font-family: inherit; font-size: 15px; outline: none;
  }
  .input::placeholder { color: var(--muted); font-style: italic; }
  .btn {
    background: rgba(201,169,106,0.1); color: var(--accent);
    border: 1px solid var(--accent);
    padding: 10px 20px; border-radius: 8px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    transition: all 0.15s; white-space: nowrap; letter-spacing: 0.5px;
  }
  .btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .status-msg {
    color: var(--muted); font-style: italic; font-size: 12px;
    margin-bottom: 14px; min-height: 18px;
    text-align: center;
  }

  .voice-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 0; width: 42px; height: 42px;
    border-radius: 8px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0; align-self: stretch;
  }
  .voice-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording {
    border-color: var(--danger); color: var(--danger);
    background: rgba(201,106,106,0.06);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .voice-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  .graph-container {
    width: 100%; height: 65vh;
    background: rgba(20,20,20,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden; position: relative;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
  }
  .graph-empty {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); font-style: italic; font-size: 15px; text-align: center;
    padding: 40px;
  }

  .tooltip {
    position: fixed;
    background: rgba(18,18,18,0.96); border: 1px solid rgba(201,169,106,0.25);
    color: var(--fg); padding: 14px 16px; border-radius: 10px;
    font-size: 12px; max-width: 320px; pointer-events: none;
    opacity: 0; transition: opacity 0.12s; z-index: 200;
    line-height: 1.65;
    box-shadow: 0 14px 32px rgba(0,0,0,0.6);
  }
  .tt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #1e1e1e; gap: 12px; }
  .tt-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); flex: 1; }
  .tt-badge { font-size: 10px; padding: 2px 10px; border-radius: 10px; text-transform: capitalize; background: #1a1a1a; color: #888; white-space: nowrap; }
  .tt-text { color: var(--fg-soft); margin-bottom: 8px; }
  .tt-milestones { color: var(--fg-soft); font-size: 12px; }
  .tt-milestones div { padding: 3px 0; border-bottom: 1px solid #1c1c1c; }
  .tt-milestones div:last-child { border-bottom: none; }

  .summary-card {
    background: rgba(20,20,20,0.62);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 26px; margin-top: 20px;
  }
  .summary-label {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; font-style: italic;
  }
  .summary-text { color: var(--fg-soft); font-size: 15px; line-height: 1.8; }

  .graph-controls {
    position: absolute; bottom: 14px; right: 14px;
    display: flex; gap: 4px; padding: 4px;
    background: rgba(10,10,10,0.65); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 8px;
  }
  .graph-btn {
    background: transparent; border: none; color: var(--muted);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px;
    font-family: inherit; transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .graph-btn:hover { color: var(--accent); background: rgba(201,169,106,0.08); }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    nav a span { display: none; }
    nav a { padding: 8px 10px; }
    main { padding: 80px 20px 40px; }
    .page-header { flex-direction: column; gap: 4px; }
    .input-row { flex-direction: column; }
    .graph-container { height: 50vh; }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
</style>
</head>
<body>
{% set active = "decisions" %}
{% include "_header.html" %}

<main>
  <div class="page-header">
    <h1 class="page-title">Decision Simulator</h1>
    <p class="page-subtitle">Describe a real decision. See how branching futures might unfold.</p>
  </div>

  <div class="input-row">
    <input type="text" id="decisionTitle" class="input" placeholder="Short title (optional)" aria-label="Decision title">
    <textarea id="decisionDesc" class="input" rows="1" placeholder="Describe the decision you're facing — context, stakes, what matters to you." aria-label="Decision description" style="flex:2;min-height:48px;resize:none;"></textarea>
    <button class="voice-btn" id="voiceBtn" aria-label="Voice input" title="Speak your decision">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
        <path d="M19 10v2a7 7 0 01-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="btn" id="simulateBtn" aria-label="Simulate this decision">Simulate</button>
  </div>
  <p class="status-msg" id="statusMsg" aria-live="polite"></p>

  <div class="graph-container" id="graphContainer">
    <div class="graph-empty" id="graphEmpty">Describe a decision above to simulate branching futures.</div>
    <svg id="graphSvg" style="display:none;width:100%;height:100%;"></svg>
  </div>

  <div class="graph-controls" id="graphControls" style="display:none">
    <button class="graph-btn" onclick="resetZoom()">Reset</button>
    <button class="graph-btn" onclick="zoomIn()">+</button>
    <button class="graph-btn" onclick="zoomOut()">−</button>
  </div>

  <div class="summary-card" id="summaryCard" style="display:none">
    <div class="summary-label">Overall Reflection</div>
    <div class="summary-text" id="summaryText"></div>
  </div>
</main>

<div class="tooltip" id="graphTooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
  let currentZoom;

  async function simulate() {
    const title = document.getElementById('decisionTitle').value.trim();
    const desc = document.getElementById('decisionDesc').value.trim();
    if (!desc) return;
    const btn = document.getElementById('simulateBtn');
    btn.disabled = true; btn.textContent = 'Simulating…';
    document.getElementById('statusMsg').textContent = 'Your twin is exploring branching futures…';
    try {
      const res = await fetch('/decisions/simulate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description: desc })
      });
      const data = await res.json();
      if (data.ok) {
        document.getElementById('statusMsg').textContent = '';
        renderGraph(data.branches, data.summary);
      } else {
        document.getElementById('statusMsg').textContent = data.error || 'Failed.';
      }
    } catch(e) {
      document.getElementById('statusMsg').textContent = 'Simulation failed.';
    }
    btn.disabled = false; btn.textContent = 'Simulate';
  }

  document.getElementById('simulateBtn').addEventListener('click', simulate);

  function renderGraph(treeData, summary) {
    const container = document.getElementById('graphContainer');
    const svg = d3.select('#graphSvg');
    svg.style('display', 'block');
    document.getElementById('graphEmpty').style.display = 'none';
    document.getElementById('graphControls').style.display = 'flex';

    if (summary) {
      document.getElementById('summaryText').textContent = summary;
      document.getElementById('summaryCard').style.display = 'block';
    } else {
      document.getElementById('summaryCard').style.display = 'none';
    }

    const width = container.clientWidth;
    const height = container.clientHeight;
    svg.attr('width', width).attr('height', height);

    const alts = treeData.alternatives || [];
    const nodes = [];
    const edges = [];
    const nodeMap = {};

    const rootId = 'root';
    nodes.push({ id: rootId, label: treeData.root?.label || 'The Decision', type: 'root', dark: true, x: width / 2, y: height * 0.2 });
    nodeMap[rootId] = nodes[0];

    alts.forEach((alt, i) => {
      const altId = alt.id || `alt_${i}`;
      const angle = (2 * Math.PI * i / alts.length) - Math.PI / 2;
      const radius = Math.min(width, height) * 0.28;
      nodes.push({
        id: altId, label: alt.label, type: 'alt', sentiment: alt.sentiment || 'neutral', dark: i % 2 === 0,
        x: width / 2 + radius * Math.cos(angle),
        y: height * 0.2 + radius * Math.sin(angle)
      });
      nodeMap[altId] = nodes[nodes.length - 1];
      edges.push({ source: rootId, target: altId });

      const children = alt.children || [];
      children.forEach((child, ci) => {
        const childId = child.id || `${altId}_${ci}`;
        const childAngle = angle + (ci - (children.length - 1) / 2) * 0.5;
        const childRadius = radius * 1.8;
        nodes.push({
          id: childId,
          label: child.timeline || child.text?.substring(0, 20) || 'Outcome',
          type: 'child', text: child.text, sentiment: child.sentiment || 'neutral',
          milestones: child.milestones || [], dark: (i + ci) % 2 === 0,
          x: width / 2 + childRadius * Math.cos(childAngle),
          y: height * 0.2 + childRadius * Math.sin(childAngle)
        });
        nodeMap[childId] = nodes[nodes.length - 1];
        edges.push({ source: altId, target: childId });
      });
    });

    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(edges).id(d => d.id).distance(d => d.source.type === 'root' ? 200 : 160).strength(0.25))
      .force('charge', d3.forceManyBody().strength(-350))
      .force('center', d3.forceCenter(width / 2, height * 0.55))
      .force('collision', d3.forceCollide().radius(55))
      .force('x', d3.forceX(width / 2).strength(0.06))
      .force('y', d3.forceY(height * 0.55).strength(0.06))
      .velocityDecay(0.45);

    nodeMap[rootId].fx = width / 2;
    nodeMap[rootId].fy = height * 0.2;

    const g = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.2, 3]).on('zoom', (e) => {
      g.attr('transform', e.transform);
      currentZoom = e.transform;
    });
    svg.call(zoom);

    const link = g.append('g').selectAll('path').data(edges).join('path')
      .attr('fill', 'none')
      .attr('stroke', '#1e1e1e')
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.8);

    const node = g.append('g').selectAll('g').data(nodes).join('g')
      .attr('class', 'node')
      .attr('transform', d => `translate(${d.x},${d.y})`);

    node.append('circle')
      .attr('r', d => d.type === 'root' ? 14 : d.type === 'alt' ? 11 : 9)
      .attr('fill', d => d.dark ? '#0e0e0e' : '#e8e4db')
      .attr('stroke', d => d.type === 'root' ? '#3a3a3a' : d.dark ? '#2e2e2e' : '#b8b3ac')
      .attr('stroke-width', d => d.type === 'root' ? 2 : 1.5);

    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', d => d.type === 'root' ? -(18) : d.type === 'alt' ? -(15) : -(13))
      .attr('font-size', d => d.type === 'root' ? '12px' : '11px')
      .attr('fill', '#9a958c')
      .text(d => {
        const max = d.type === 'root' ? 24 : d.type === 'alt' ? 18 : 16;
        return d.label.length > max ? d.label.substring(0, max - 2) + '…' : d.label;
      });

    node.call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); if (d.id !== rootId) { d.fx = null; d.fy = null; } })
    );

    const tooltip = document.getElementById('graphTooltip');
    node.on('mouseover', (e, d) => {
      if (d.type === 'root') return;
      let html = `<div class="tt-header">
        <span class="tt-label">${d.label}</span>
        <span class="tt-badge">${d.sentiment || ''}</span>
      </div>`;
      if (d.text) html += `<div class="tt-text">${d.text}</div>`;
      if (d.milestones && d.milestones.length) {
        html += `<div class="tt-milestones">${d.milestones.map(m => `<div>→ ${m}</div>`).join('')}</div>`;
      }
      tooltip.innerHTML = html;
      tooltip.style.opacity = '1';
      tooltip.style.left = (e.pageX + 14) + 'px';
      tooltip.style.top = (e.pageY - 10) + 'px';
    })
    .on('mousemove', e => {
      tooltip.style.left = (e.pageX + 14) + 'px';
      tooltip.style.top = (e.pageY - 10) + 'px';
    })
    .on('mouseout', () => { tooltip.style.opacity = '0'; });

    simulation.on('tick', () => {
      link.attr('d', d => {
        const sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
        const mx = (sx + tx) / 2 + (sy - ty) * 0.15;
        const my = (sy + ty) / 2 - (sx - tx) * 0.15;
        return `M${sx},${sy} Q${mx},${my} ${tx},${ty}`;
      });
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  }

  function resetZoom() { d3.select('#graphSvg').transition().call(d3.zoom().transform, d3.zoomIdentity); }
  function zoomIn() { d3.select('#graphSvg').transition().call(d3.zoom().scaleBy, 1.3); }
  function zoomOut() { d3.select('#graphSvg').transition().call(d3.zoom().scaleBy, 0.7); }

  // --- Voice Input ---
  const voiceBtn = document.getElementById('voiceBtn');
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        if (audioChunks.length === 0) return;
        const blob = new Blob(audioChunks, { type: mimeType });
        await sendAudio(blob);
      };
      mediaRecorder.start();
      voiceBtn.classList.add('recording');
      isRecording = true;
    } catch(e) { console.error('Microphone denied:', e); }
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) { mediaRecorder.stop(); voiceBtn.classList.remove('recording'); isRecording = false; }
  }

  voiceBtn.addEventListener('mousedown', () => startRecording());
  voiceBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  voiceBtn.addEventListener('mouseup', () => stopRecording());
  voiceBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
  voiceBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

  async function sendAudio(blob) {
    voiceBtn.disabled = true;
    try {
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');
      const res = await fetch('/chat/transcribe', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.text) {
        const input = document.getElementById('decisionDesc');
        input.value = data.text;
        input.focus();
      }
    } catch(e) { console.error('Transcription failed:', e); }
    voiceBtn.disabled = false;
  }
</script>
</body>
</html>
