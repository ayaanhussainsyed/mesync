<style>
  .topbar-hover {
    position: fixed; top: 0; left: 0; right: 0; height: 14px;
    z-index: 99; pointer-events: auto;
  }
  .topbar-hover::after {
    content: '';
    position: absolute; top: 0; left: 50%;
    transform: translateX(-50%);
    width: 52px; height: 3px;
    background: rgba(201,169,106,0.35);
    border-radius: 0 0 3px 3px;
    transition: opacity 0.2s, width 0.2s;
  }
  .topbar-hover:hover::after,
  .topbar:hover ~ .topbar-hover::after,
  body:has(.topbar:hover) .topbar-hover::after { opacity: 0; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px; height: 68px;
    border-bottom: 1px solid var(--border, #1c1c1c);
    background: rgba(10,10,10,0.78);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    transform: translateY(calc(-100% - 2px));
    transition: transform 0.25s ease;
  }
  .topbar:hover,
  .topbar:focus-within,
  .topbar-hover:hover + .topbar { transform: translateY(0); }
  .topbar .brand {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; flex-shrink: 0;
  }
  .topbar .brand-icon { width: 28px; height: 28px; color: var(--accent, #c9a96a); }
  .topbar .brand-name {
    font-size: 11px; letter-spacing: 3px;
    color: var(--muted, #6b665d); text-transform: uppercase;
  }

  .rail { display: flex; align-items: center; gap: 2px; }
  .rail a {
    position: relative;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 9px;
    color: var(--muted, #6b665d); text-decoration: none;
    transition: color 0.15s, background 0.15s;
  }
  .rail a svg {
    width: 20px; height: 20px;
    stroke: currentColor; fill: none; stroke-width: 1.6;
  }
  .rail a:hover {
    color: var(--fg, #e8e4db);
    background: rgba(201,169,106,0.08);
  }
  .rail a[aria-current="page"] {
    color: var(--accent, #c9a96a);
    background: rgba(201,169,106,0.11);
  }
  .rail a[aria-current="page"]::after {
    content: '';
    position: absolute; bottom: 3px; left: 50%;
    transform: translateX(-50%); width: 16px; height: 2px;
    background: var(--accent, #c9a96a); border-radius: 2px;
    box-shadow: 0 0 6px rgba(201,169,106,0.5);
  }
  .rail a::before {
    content: attr(data-label);
    position: absolute; top: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    padding: 4px 10px;
    background: #141414; border: 1px solid rgba(201,169,106,0.18);
    border-radius: 5px;
    color: #e8e4db; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap;
    font-family: 'Lora', serif;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s;
    z-index: 200;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .rail a:hover::before { opacity: 1; }
  .rail-sep {
    width: 1px; height: 18px; margin: 0 6px;
    background: var(--border, #1c1c1c);
  }
  .rail a.danger:hover { color: #c96a6a; background: rgba(201,106,106,0.06); }

  @media (max-width: 760px) {
    .topbar { padding: 0 14px; height: 58px; }
    .topbar .brand-name { display: none; }
    .topbar .brand-icon { width: 24px; height: 24px; }
    .rail a { width: 38px; height: 38px; border-radius: 8px; }
    .rail a svg { width: 18px; height: 18px; }
    .rail-sep { margin: 0 5px; height: 18px; }
    .rail a::before { display: none; }
  }
</style>
<div class="topbar-hover" aria-hidden="true"></div>
<header class="topbar">
  <a href="/dashboard" class="brand" aria-label="MeSync home">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    <span class="brand-name">MeSync</span>
  </a>
  <nav class="rail" aria-label="Main navigation">
    <a href="/chat" data-label="Chat" aria-label="Chat"{% if active == 'chat' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </a>
    <a href="/journal" data-label="Journal" aria-label="Journal"{% if active == 'journal' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    </a>
    <a href="/letters" data-label="Letters" aria-label="Letters"{% if active == 'letters' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>
    </a>
    <a href="/integrations" data-label="Apps" aria-label="Connected apps"{% if active == 'integrations' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
    </a>
    <a href="/graph" data-label="Memory" aria-label="Memory graph"{% if active == 'graph' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="12" cy="18" r="3"/><line x1="8.5" y1="7.5" x2="10.5" y2="15.5"/><line x1="15.5" y1="7.5" x2="13.5" y2="15.5"/></svg>
    </a>
    <a href="/drift" data-label="Drift" aria-label="Drift"{% if active == 'drift' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><polyline points="3 18 8 12 13 16 21 6"/></svg>
    </a>
    <a href="/decisions" data-label="Decisions" aria-label="Decisions"{% if active == 'decisions' %} aria-current="page"{% endif %}>
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    </a>
    <span class="rail-sep" aria-hidden="true"></span>
    <a href="/logout" data-label="Sign out" aria-label="Sign out" class="danger">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </a>
  </nav>
</header>
