<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat · MeSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a; --fg: #e8e4db; --fg-soft: #c9c4b8; --muted: #6b665d;
    --accent: #c9a96a; --accent-soft: #a88a4f; --card: #141414; --border: #1c1c1c;
    --danger: #c96a6a;
    --sidebar-bg: #0d0c0a;
    --hover: rgba(201,169,106,0.06);
    --active: rgba(201,169,106,0.11);
    --header-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--fg); font-family: 'Lora', serif;
    font-weight: 400; height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ---- Subtle page background texture ---- */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(201,169,106,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(ellipse at center, black 25%, transparent 85%);
    -webkit-mask-image: radial-gradient(ellipse at center, black 25%, transparent 85%);
    opacity: 0.7;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 500px 400px at 15% 85%, rgba(201,169,106,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 85% 15%, rgba(201,169,106,0.05) 0%, transparent 70%);
  }

  /* ---- Top header (glassy) ---- */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: var(--header-h);
    border-bottom: 1px solid var(--border);
    background: rgba(10, 10, 10, 0.72);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
  }
  .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .brand-icon { width: 28px; height: 28px; color: var(--accent); }
  .brand-name { font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
  nav { display: flex; align-items: center; gap: 6px; }
  nav a {
    display: flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 13px;
    padding: 8px 14px; border-radius: 4px; transition: color 0.2s;
  }
  nav a svg { width: 15px; height: 15px; }
  nav a:hover { color: var(--fg-soft); }
  nav a[aria-current="page"] { color: var(--accent); }
  nav a.btn-logout { color: var(--muted); margin-left: 8px; }
  nav a.btn-logout:hover { color: var(--danger); }

  /* ---- Chat shell (sidebar + main) ---- */
  .chat-shell {
    position: fixed; top: var(--header-h); left: 0; right: 0; bottom: 0;
    display: flex;
    z-index: 5;
  }

  .sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-head { padding: 16px 16px 12px; }
  .new-thread-btn {
    width: 100%;
    background: transparent; border: 1px solid var(--accent);
    color: var(--accent); padding: 11px 14px; border-radius: 6px;
    font-family: inherit; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .new-thread-btn:hover { background: var(--accent); color: var(--bg); }
  .new-thread-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; }
  .new-thread-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .sidebar-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--muted); font-style: italic;
    padding: 14px 20px 8px;
  }

  .thread-list {
    flex: 1; overflow-y: auto; padding: 0 10px 16px;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,169,106,0.2) transparent;
  }
  .thread-list::-webkit-scrollbar { width: 6px; }
  .thread-list::-webkit-scrollbar-thumb { background: rgba(201,169,106,0.2); border-radius: 3px; }

  .thread-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 6px;
    cursor: pointer; border: none; background: transparent;
    color: var(--fg-soft); font-family: inherit; text-align: left;
    width: 100%; margin-bottom: 2px;
    position: relative;
    transition: background 0.15s;
  }
  .thread-item:hover { background: var(--hover); }
  .thread-item.active { background: var(--active); }
  .thread-item.active::before {
    content: ''; position: absolute;
    left: 0; top: 8px; bottom: 8px; width: 2px;
    background: var(--accent); border-radius: 2px;
  }
  .thread-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(201,169,106,0.08);
    border: 1px solid rgba(201,169,106,0.18);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .thread-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .thread-body { flex: 1; min-width: 0; }
  .thread-persona {
    font-size: 13px; color: var(--fg); font-style: italic;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thread-meta {
    font-size: 11px; color: var(--muted);
    display: flex; gap: 8px; margin-top: 2px;
  }
  .thread-meta::before {
    content: ''; width: 3px; height: 3px; border-radius: 50%;
    background: var(--muted); align-self: center; display: inline-block;
  }
  .thread-meta { align-items: center; gap: 6px; }
  .thread-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

  .sidebar-empty {
    text-align: center; padding: 24px 16px;
    color: var(--muted); font-style: italic; font-size: 13px;
  }

  /* ---- Main chat pane ---- */
  .chat-pane {
    flex: 1; min-width: 0;
    position: relative;
    display: flex; flex-direction: column;
    background: var(--bg);
  }

  /* ---- Persona picker (shown when no active thread) ---- */
  /* Fits entirely in the pane at every screen size — never scrolls. */
  .persona-picker {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .picker-head {
    flex-shrink: 0;
    padding: 24px 32px 12px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center;
  }
  .picker-kicker {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--accent); font-style: italic; margin-bottom: 10px;
    padding: 4px 12px; border: 1px solid rgba(201,169,106,0.25);
    border-radius: 999px; background: rgba(201,169,106,0.04);
  }
  .picker-title {
    font-size: 24px; font-style: italic; color: var(--accent);
    font-weight: 400; margin-bottom: 6px;
    letter-spacing: -0.01em; max-width: 640px;
    line-height: 1.2;
  }
  .picker-sub {
    color: var(--fg-soft); font-size: 13px; line-height: 1.5;
    max-width: 460px; margin: 0 auto;
  }
  .picker-body {
    flex: 1; min-height: 0;
    padding: 8px 32px 24px;
    display: flex;
    overflow: hidden;
  }
  .persona-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 10px;
    width: 100%; max-width: 820px;
    margin: 0 auto;
    min-height: 0;
  }
  .persona-card {
    background: rgba(20,20,20,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer; font-family: inherit;
    color: var(--fg-soft); text-align: left;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
    min-height: 0; min-width: 0;
    justify-content: center;
  }
  .persona-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,169,106,0.08), transparent 50%);
    opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }
  .persona-card:hover {
    border-color: var(--accent); transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.5);
  }
  .persona-card:hover::before { opacity: 1; }
  .persona-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .persona-card-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(201,169,106,0.08);
    border: 1px solid rgba(201,169,106,0.22);
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
  }
  .persona-card-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 1.6; }
  .persona-card-name {
    font-size: 16px; color: var(--fg); font-style: italic;
    position: relative; z-index: 1;
  }
  .persona-card-desc {
    font-size: 12px; color: var(--muted); line-height: 1.5;
    position: relative; z-index: 1;
  }

  /* ---- Active chat view ---- */
  .chat-view {
    flex: 1;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .chat-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .persona-badge {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 8px;
    background: rgba(201,169,106,0.06);
    border: 1px solid rgba(201,169,106,0.2);
    border-radius: 999px;
  }
  .persona-badge-icon {
    width: 26px; height: 26px; border-radius: 50%;
    background: rgba(201,169,106,0.12);
    display: flex; align-items: center; justify-content: center;
  }
  .persona-badge-icon svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.8; }
  .persona-badge-name {
    font-size: 13px; color: var(--accent); font-style: italic;
    letter-spacing: 0.3px;
  }
  .persona-badge-name strong { font-weight: 500; }

  .chat-head-actions { display: flex; gap: 8px; }
  .tool-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); width: 36px; height: 36px;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .tool-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(201,169,106,0.08); }
  .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .tool-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- Messages ---- */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 28px 32px;
    display: flex; flex-direction: column; gap: 18px;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,169,106,0.2) transparent;
    max-width: 860px; width: 100%; margin: 0 auto;
  }
  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,169,106,0.2); border-radius: 3px; }

  .msg { max-width: 82%; animation: msgIn 220ms ease-out; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.twin { align-self: flex-start; }
  .bubble {
    padding: 13px 18px; font-size: 15px; line-height: 1.65;
    border-radius: 12px;
  }
  .msg.user .bubble {
    background: rgba(201,169,106,0.1);
    border: 1px solid rgba(201,169,106,0.35);
    color: var(--fg);
    border-bottom-right-radius: 4px;
  }
  .msg.twin .bubble {
    background: var(--card); border: 1px solid var(--border);
    color: var(--fg);
    border-bottom-left-radius: 4px;
  }
  .msg-time {
    font-size: 11px; color: var(--muted); margin-top: 4px;
    padding: 0 6px; font-style: italic;
  }
  .msg.user .msg-time { text-align: right; }

  .chat-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--muted); font-style: italic; font-size: 15px;
    text-align: center; padding: 48px;
  }

  .typing {
    color: var(--muted); font-size: 13px; font-style: italic;
    padding: 2px 32px 4px; max-width: 860px; margin: 0 auto; width: 100%;
    display: none;
  }
  .typing.visible { display: block; }
  .typing::after {
    content: ''; display: inline-block;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent); margin-left: 6px;
    animation: dot 1s ease-in-out infinite;
  }
  @keyframes dot {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ---- Composer ---- */
  .composer {
    padding: 12px 32px 22px;
    background: transparent;
  }
  .composer-inner {
    max-width: 860px; margin: 0 auto;
    display: flex; align-items: flex-end; gap: 8px;
    padding: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    transition: border-color 0.2s;
  }
  .composer-inner:focus-within {
    border-color: rgba(201,169,106,0.5);
    box-shadow: 0 0 0 3px rgba(201,169,106,0.08);
  }
  #msgInput {
    flex: 1;
    background: transparent; border: none; outline: none;
    color: var(--fg); font-family: inherit;
    font-size: 15px; line-height: 1.55;
    padding: 10px 6px;
    min-height: 40px; max-height: 180px;
    resize: none;
  }
  #msgInput::placeholder { color: var(--muted); font-style: italic; }

  .mic-btn {
    background: transparent; border: none;
    color: var(--muted);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
  .mic-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .mic-btn:hover { color: var(--accent); background: rgba(201,169,106,0.06); }
  .mic-btn.recording { color: var(--danger); animation: pulseBtn 1.1s ease-in-out infinite; }
  .mic-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  @keyframes pulseBtn { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .send-btn {
    background: var(--accent); border: none; color: var(--bg);
    width: 40px; height: 40px; border-radius: 10px;
    cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
  }
  .send-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2.2; }
  .send-btn:hover:not(:disabled) { transform: scale(1.06); background: #d8b977; }
  .send-btn:active:not(:disabled) { transform: scale(0.96); }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .send-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---- Sidebar toggle (mobile) ---- */
  .sidebar-toggle {
    display: none;
    position: fixed; top: 74px; left: 12px; z-index: 50;
    background: rgba(20,20,20,0.85);
    border: 1px solid var(--border);
    color: var(--fg-soft);
    width: 36px; height: 36px; border-radius: 8px;
    cursor: pointer;
    align-items: center; justify-content: center;
  }
  .sidebar-toggle svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .sidebar-scrim {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 45;
  }

  /* ---- Responsive ---- */
  @media (max-width: 900px) {
    header { padding: 0 16px; }
    .chat-shell { flex-direction: row; }
    .sidebar {
      position: fixed; top: var(--header-h); bottom: 0; left: 0;
      width: 280px; z-index: 60;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar.open ~ .sidebar-scrim { display: block; }
    .sidebar-toggle { display: flex; }
    .sidebar-toggle.open { left: 300px; }

    /* Picker must fit without scrolling: head is compact, grid fills remaining height. */
    .persona-picker { overflow: hidden; }
    .picker-head { padding: 16px 18px 8px; flex-shrink: 0; }
    .picker-kicker { display: none; }
    .picker-title { font-size: 18px; line-height: 1.25; margin-bottom: 4px; max-width: 100%; }
    .picker-sub { display: none; }
    .picker-body {
      padding: 4px 14px 14px;
      overflow: hidden;
      display: flex;
    }
    .persona-grid {
      flex: 1;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 1fr;
      gap: 8px;
      max-width: 100%;
    }
    .persona-card {
      padding: 8px 10px;
      gap: 4px;
      min-height: 0;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .persona-card-desc { display: none; }
    .persona-card-icon { width: 28px; height: 28px; }
    .persona-card-icon svg { width: 14px; height: 14px; }
    .persona-card-name { font-size: 13px; line-height: 1.2; }

    .chat-head { padding: 12px 16px; }
    .messages { padding: 20px 16px; }
    .composer { padding: 10px 16px 16px; }
    nav a span { display: none; }
    .msg { max-width: 92%; }
  }
  @media (max-width: 500px) {
    .picker-head { padding: 12px 14px 6px; }
    .picker-title { font-size: 16px; }
    .picker-body { padding: 4px 10px 10px; }
    .persona-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .persona-card { padding: 6px 6px; }
    .persona-card-name { font-size: 12px; }
  }
  @media (max-width: 360px) {
    .persona-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<header>
  <a href="/dashboard" class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
    </svg>
    <span class="brand-name">MeSync</span>
  </a>
  <nav role="navigation" aria-label="Main navigation">
    <a href="/chat" aria-current="page" aria-label="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span>Chat</span>
    </a>
    <a href="/journal" aria-label="Journal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>Journal</span>
    </a>
    <a href="/letters" aria-label="Letters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="5" width="18" height="14" rx="2"/>
        <polyline points="3 7 12 13 21 7"/>
      </svg>
      <span>Letters</span>
    </a>
    <a href="/integrations" aria-label="Apps">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
      </svg>
      <span>Apps</span>
    </a>
    <a href="/graph" aria-label="Graph">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/>
        <circle cx="12" cy="18" r="3"/>
        <line x1="8.5" y1="7.5" x2="10.5" y2="15.5"/>
        <line x1="15.5" y1="7.5" x2="13.5" y2="15.5"/>
      </svg>
      <span>Graph</span>
    </a>
    <a href="/drift" aria-label="Drift">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="3 18 8 12 13 16 21 6"/>
      </svg>
      <span>Drift</span>
    </a>
    <a href="/decisions" aria-label="Decisions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      <span>Decisions</span>
    </a>
    <a href="/logout" class="btn-logout" aria-label="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </a>
  </nav>
</header>

<button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle thread list">
  <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="chat-shell">
  <aside class="sidebar" id="sidebar" aria-label="Conversation threads">
    <div class="sidebar-head">
      <button class="new-thread-btn" id="newThreadBtn">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Chat
      </button>
    </div>
    <div class="sidebar-label">Conversations</div>
    <div class="thread-list" id="threadList">
      <p class="sidebar-empty">Loading&hellip;</p>
    </div>
  </aside>
  <div class="sidebar-scrim" id="sidebarScrim"></div>

  <section class="chat-pane">
    <!-- Persona Picker -->
    <div class="persona-picker" id="personaPicker">
      <div class="picker-head">
        <span class="picker-kicker">Choose a persona</span>
        <h1 class="picker-title">Which version of yourself do you want to talk to?</h1>
        <p class="picker-sub">Each persona is still <em>you</em> — a different facet wearing a different mask.</p>
      </div>
      <div class="picker-body">
        <div class="persona-grid" id="personaGrid"></div>
      </div>
    </div>

    <!-- Active Chat View -->
    <div class="chat-view" id="chatView" hidden>
      <header class="chat-head">
        <div class="persona-badge" id="personaBadge"></div>
        <div class="chat-head-actions">
          <button class="tool-btn" id="voiceOutputBtn" aria-pressed="false" aria-label="Play twin responses aloud" title="Voice output">
            <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
          </button>
        </div>
      </header>

      <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Conversation"></div>

      <p class="typing" id="typingIndicator" aria-live="off">Twin is thinking</p>

      <div class="composer">
        <div class="composer-inner">
          <button class="mic-btn" id="voiceBtn" aria-label="Hold to record voice" title="Hold to record">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <textarea id="msgInput" rows="1" placeholder="Message your twin…" aria-label="Message input"></textarea>
          <button class="send-btn" id="sendBtn" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </section>
</div>

<script>
  // ===== Persona definitions =====
  const PERSONAS = [
    { id: 'chat',             name: 'Default',          desc: 'Just you, as you are.',                         icon: 'default' },
    { id: 'future_self',      name: 'Future Self',      desc: 'Writes letters back from 10 years ahead.',      icon: 'letter' },
    { id: 'professional',     name: 'Professional',     desc: 'Polished. Corporate. Boardroom you.',           icon: 'briefcase' },
    { id: 'angry',            name: 'Angry',            desc: 'Frustrated. Blunt. Filter off.',                icon: 'flame' },
    { id: 'sad',              name: 'Sad',              desc: 'Quiet. Introspective. Heavy today.',            icon: 'rain' },
    { id: 'emo',              name: 'Emo',              desc: 'Dark. Poetic. All feeling, no caps.',           icon: 'moon' },
    { id: 'hype',             name: 'Hype',             desc: 'Turned up to 11. Full throttle.',               icon: 'bolt' },
    { id: 'chill',            name: 'Chill',            desc: 'Low-key. Weekend mode.',                        icon: 'leaf' },
    { id: 'devils_advocate',  name: "Devil's Advocate", desc: 'Argues against you. Sharpens your thinking.',   icon: 'scale' },
  ];
  const PERSONA_BY_ID = Object.fromEntries(PERSONAS.map(p => [p.id, p]));

  const ICONS = {
    default:   '<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0114 0v1"/></svg>',
    briefcase: '<svg viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',
    flame:     '<svg viewBox="0 0 24 24"><path d="M12 2s4 4 4 8a4 4 0 11-8 0 6 6 0 012-4c0-2-1-3 0-4z"/><path d="M12 22a5 5 0 005-5c0-2-2-3-2-5"/></svg>',
    rain:      '<svg viewBox="0 0 24 24"><path d="M16 13a4 4 0 100-8 5 5 0 00-9.9 1A4 4 0 007 13"/><line x1="8" y1="17" x2="8" y2="21"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="16" y1="17" x2="16" y2="21"/></svg>',
    moon:      '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg>',
    bolt:      '<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
    leaf:      '<svg viewBox="0 0 24 24"><path d="M11 20A7 7 0 014 13V5h7a7 7 0 017 7v0a7 7 0 01-7 7z"/><path d="M4 20l8-8"/></svg>',
    scale:     '<svg viewBox="0 0 24 24"><line x1="12" y1="3" x2="12" y2="21"/><path d="M7 8l-4 8h8L7 8z"/><path d="M17 8l-4 8h8l-4-8z"/><line x1="4" y1="21" x2="20" y2="21"/></svg>',
    letter:    '<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3 7 12 13 21 7"/></svg>',
  };

  function iconSvg(id) { return ICONS[id] || ICONS.default; }

  // ===== State =====
  let threads = [];
  let conversationId = null;
  let currentMode = 'chat';
  let isLoading = false;
  let voiceOutputEnabled = false;

  const personaGrid   = document.getElementById('personaGrid');
  const personaPicker = document.getElementById('personaPicker');
  const chatView      = document.getElementById('chatView');
  const threadList    = document.getElementById('threadList');
  const personaBadge  = document.getElementById('personaBadge');
  const messagesEl    = document.getElementById('messages');
  const msgInput      = document.getElementById('msgInput');
  const sendBtn       = document.getElementById('sendBtn');
  const voiceBtn      = document.getElementById('voiceBtn');
  const voiceOutBtn   = document.getElementById('voiceOutputBtn');
  const typingInd     = document.getElementById('typingIndicator');
  const newThreadBtn  = document.getElementById('newThreadBtn');
  const sidebar       = document.getElementById('sidebar');
  const sidebarToggle = document.getElementById('sidebarToggle');
  const sidebarScrim  = document.getElementById('sidebarScrim');

  // ===== Persona picker render =====
  function renderPersonaGrid() {
    personaGrid.innerHTML = PERSONAS.map(p => `
      <button class="persona-card" data-persona="${p.id}" type="button">
        <div class="persona-card-icon">${iconSvg(p.icon)}</div>
        <div class="persona-card-name">${p.name}</div>
        <div class="persona-card-desc">${p.desc}</div>
      </button>
    `).join('');
    personaGrid.querySelectorAll('.persona-card').forEach(card => {
      card.addEventListener('click', () => startNewThread(card.dataset.persona));
    });
  }

  // ===== Thread list render =====
  function relTime(iso) {
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60) + 'm ago';
    if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
    if (diff < 604800) return Math.floor(diff/86400) + 'd ago';
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function renderThreads() {
    if (!threads.length) {
      threadList.innerHTML = '<p class="sidebar-empty">No chats yet.<br>Start one from the right.</p>';
      return;
    }
    threadList.innerHTML = threads.map(t => {
      const p = PERSONA_BY_ID[t.mode] || PERSONA_BY_ID.chat;
      const active = t.id === conversationId ? ' active' : '';
      const msgLabel = t.message_count === 1 ? '1 msg' : (t.message_count + ' msgs');
      return `
        <button type="button" class="thread-item${active}" data-id="${t.id}">
          <div class="thread-icon">${iconSvg(p.icon)}</div>
          <div class="thread-body">
            <div class="thread-persona">${p.name}</div>
            <div class="thread-meta">
              <span>${relTime(t.updated_at)}</span>
              <span class="dot"></span>
              <span>${msgLabel}</span>
            </div>
          </div>
        </button>
      `;
    }).join('');
    threadList.querySelectorAll('.thread-item').forEach(btn => {
      btn.addEventListener('click', () => switchThread(btn.dataset.id));
    });
  }

  // ===== Load threads from backend =====
  async function loadThreads() {
    try {
      const res = await fetch('/chat/history');
      const data = await res.json();
      threads = (data.conversations || []).filter(t => t.message_count > 0);
      renderThreads();
      // If no active thread and there are threads, pick the most recent one.
      if (!conversationId && threads.length) {
        await switchThread(threads[0].id);
      }
    } catch(e) {
      threadList.innerHTML = '<p class="sidebar-empty">Could not load.</p>';
    }
  }

  // ===== Switch to existing thread =====
  async function switchThread(cid) {
    try {
      const res = await fetch('/chat/conversation/' + cid);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      conversationId = data.id;
      currentMode = data.mode || 'chat';
      showChatView();
      renderPersonaBadge();
      renderMessages(data.messages || []);
      renderThreads();
      closeSidebar();
    } catch(e) {
      console.error('Failed to load thread', e);
    }
  }

  // ===== Start new thread with a persona =====
  async function startNewThread(persona) {
    try {
      const res = await fetch('/chat/conversation', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode: persona })
      });
      const data = await res.json();
      conversationId = data.conversation_id;
      currentMode = persona;
      showChatView();
      renderPersonaBadge();
      renderMessages([]);
      // don't add to threads list yet — it shows up after first message exchanges.
      msgInput.focus();
      closeSidebar();
    } catch(e) {
      console.error('Failed to start thread', e);
    }
  }

  function showPicker() {
    conversationId = null;
    chatView.hidden = true;
    personaPicker.hidden = false;
    renderThreads();
  }
  function showChatView() {
    personaPicker.hidden = true;
    chatView.hidden = false;
  }

  newThreadBtn.addEventListener('click', () => { showPicker(); closeSidebar(); });

  // ===== Persona badge =====
  function renderPersonaBadge() {
    const p = PERSONA_BY_ID[currentMode] || PERSONA_BY_ID.chat;
    personaBadge.innerHTML = `
      <div class="persona-badge-icon">${iconSvg(p.icon)}</div>
      <div class="persona-badge-name">Talking as <strong>${p.name}</strong></div>
    `;
  }

  // ===== Render messages =====
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text ?? '';
    return div.innerHTML.replace(/\n/g, '<br>');
  }

  function renderMessages(messages) {
    if (!messages.length) {
      const p = PERSONA_BY_ID[currentMode] || PERSONA_BY_ID.chat;
      messagesEl.innerHTML = `<div class="chat-empty">
        <span>You're chatting with your <em>${p.name}</em> self.</span>
        <span style="font-size:13px; opacity:0.8;">Say anything. It'll answer like you would — in this mood.</span>
      </div>`;
      return;
    }
    messagesEl.innerHTML = messages.map(m => {
      const time = m.created_at
        ? new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';
      const role = m.role === 'user' ? 'user' : 'twin';
      return `<div class="msg ${role}">
        <div class="bubble">${escapeHtml(m.content)}</div>
        ${time ? `<div class="msg-time">${time}</div>` : ''}
      </div>`;
    }).join('');
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMessage(role, content) {
    const empty = messagesEl.querySelector('.chat-empty');
    if (empty) empty.remove();
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const el = document.createElement('div');
    el.className = 'msg ' + role;
    el.innerHTML = `<div class="bubble">${escapeHtml(content)}</div><div class="msg-time">${time}</div>`;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  // ===== Send =====
  function autoResize() {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
    sendBtn.disabled = !msgInput.value.trim() || isLoading;
  }
  msgInput.addEventListener('input', autoResize);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isLoading || !conversationId) return;

    isLoading = true;
    sendBtn.disabled = true;
    typingInd.classList.add('visible');

    appendMessage('user', text);
    msgInput.value = '';
    autoResize();

    try {
      const res = await fetch('/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, message: text, mode: currentMode })
      });
      const data = await res.json();
      if (data.response) {
        appendMessage('twin', data.response);
        if (voiceOutputEnabled) playTwinVoice(data.response);
      } else if (data.error) {
        const el = appendMessage('twin', 'Error: ' + data.error);
        el.querySelector('.bubble').style.color = 'var(--danger)';
      }
      await loadThreads();
    } catch(e) {
      const el = appendMessage('twin', 'Failed to send. Please try again.');
      el.querySelector('.bubble').style.color = 'var(--danger)';
    }

    isLoading = false;
    typingInd.classList.remove('visible');
    autoResize();
    msgInput.focus();
  }

  // ===== Voice input (hold to record) =====
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;

  async function startRecording() {
    if (isRecording) return;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
      mediaRecorder = new MediaRecorder(stream, { mimeType });
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        stream.getTracks().forEach(t => t.stop());
        if (audioChunks.length === 0) return;
        const blob = new Blob(audioChunks, { type: mimeType });
        await sendAudio(blob);
      };
      mediaRecorder.start();
      voiceBtn.classList.add('recording');
      isRecording = true;
    } catch(e) {
      console.error('Microphone access denied:', e);
    }
  }
  function stopRecording() {
    if (mediaRecorder && isRecording) {
      mediaRecorder.stop();
      voiceBtn.classList.remove('recording');
      isRecording = false;
    }
  }
  voiceBtn.addEventListener('mousedown', startRecording);
  voiceBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
  voiceBtn.addEventListener('mouseup', stopRecording);
  voiceBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
  voiceBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

  async function sendAudio(blob) {
    voiceBtn.disabled = true;
    try {
      const formData = new FormData();
      formData.append('audio', blob, 'recording.webm');
      const res = await fetch('/chat/transcribe', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.text) {
        msgInput.value = data.text;
        autoResize();
        msgInput.focus();
      }
    } catch(e) {
      console.error('Transcription failed:', e);
    }
    voiceBtn.disabled = false;
  }

  async function playTwinVoice(text) {
    try {
      const res = await fetch('/chat/speak', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      if (data.audio) new Audio(data.audio).play();
    } catch(e) { console.error('TTS failed:', e); }
  }

  voiceOutBtn.addEventListener('click', () => {
    voiceOutputEnabled = !voiceOutputEnabled;
    voiceOutBtn.classList.toggle('active', voiceOutputEnabled);
    voiceOutBtn.setAttribute('aria-pressed', String(voiceOutputEnabled));
  });

  // ===== Sidebar (mobile) =====
  function openSidebar() { sidebar.classList.add('open'); }
  function closeSidebar() { sidebar.classList.remove('open'); }
  sidebarToggle.addEventListener('click', () => sidebar.classList.toggle('open'));
  sidebarScrim.addEventListener('click', closeSidebar);

  // ===== Init =====
  renderPersonaGrid();
  loadThreads();
</script>
</body>
</html>
