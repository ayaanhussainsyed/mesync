<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Inconsolata:wght@200..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
    rel="stylesheet"
  />
    <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Zilla+Slab:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Login | MeSync</title>
</head>
<style>
    body {
    background: linear-gradient(-45deg, black, #454a4e, #a0a0a6);
    background-size: 400% 400%;
    animation: gradientFlow 9s ease infinite;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    color: black;
    font-family: "Inter", sans-serif;
  }
  
  
  .container {
      background-color: white;
      border: 0.5 solid black;
      height: fit-content;
      padding: 25px;
      min-height: 220px;
      width: 500px;
      display: block;
      margin: auto;
      border-radius: 6px;
      font-family: "Inter", sans-serif;
      animation: popIn 0.8s ease-out;
    }
    h3 {
      font-weight: bolder;
    }
    h1 {
      text-align: center;
      font-family: "Zilla Slab", sans-serif;
    }
    .input-group-text {
      background-color: white;
      border-left: none;
    }
    .input-group .form-control {
      border-right: none;
    }
  
    @media (max-width: 768px) {
      .container {
        width: 90%;
        padding: 15px;
      }
    }
  
    @media (max-width: 480px) {
      .container {
        width: 95%;
        padding: 10px;
      }
  
      h3 {
        font-size: 1.2rem;
      }
    }
  
    @keyframes popIn {
      0% {
        transform: translateY(50px);
        opacity: 0;
      }
      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
    @keyframes gradientFlow {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }
  
    .btn-dark {
      position: relative;
      padding-right: 25px;
    }
  
    .btn-dark svg {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
  
    .btn-dark:hover svg {
      opacity: 1;
      right: 5px;
    }
    a.signup-link svg {
    transition: transform 0.3s ease;
  }
  
  a.signup-link:hover svg {
    transform: translateX(4px);
  }
  
</style>
<body>
    <br><br><br><br><br><br><br><br>

    <div class="container">
        <h3>Login</h3>
        <div id="emailHelp" class="form-text">Continue to MeSync.</div>
        <br />
        <form method="POST">
          <div class="mb-3">
            <label style="color:#717171;font-size:15px;" class="form-label">Username</label>
            <input
              class="form-control"
              id="email"
              aria-describedby="emailHelp"
              name="username"
            />
          </div>
          <div class="mb-3 position-relative">
            <label for="exampleInputPassword1" style="color:#717171;font-size:15px;" class="form-label">Password</label>
            <div class="input-group">
              <input
                type="password"
                class="form-control"
                id="exampleInputPassword1"
                name="password"
              />
              <span
                class="input-group-text"
                onclick="togglePasswordVisibility()"
                style="cursor: pointer"
              >
                <svg
                  id="eyeIcon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="currentColor"
                  class="bi bi-eye-slash"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755q-.247.248-.517.486z"
                  />
                  <path
                    d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"
                  />
                  <path
                    d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"
                  />
                </svg>
              </span>
            </div>
          </div>
          <br /><br />
          <span style="font-size: 12px"
            >Don't have an account?
            <a href="/sign-up" class="signup-link" style="color:#5F79B6; text-decoration:none;"
              >Sign Up
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-arrow-right"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8"
                /></svg></a
          ></span>
          <br />
          <br />
          <button
            type="submit"
            class="btn btn-dark"
            style="width: 180px; display: block; margin: auto; font-size: 13px"
          >
            Continue
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-arrow-right"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8"
              />
            </svg>
          </button>
        </form>
      </div>


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>

</html>
