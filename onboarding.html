<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onboarding · MeSync</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e8e4db;
    --fg-soft: #c9c4b8;
    --muted: #6b665d;
    --accent: #c9a96a;
    --card: #141414;
    --border: #1c1c1c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Lora', serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* top bar */
  .progress-wrap {
    position: fixed; top: 0; left: 0; right: 0;
    padding: 28px 40px 0; display: flex; justify-content: space-between;
    align-items: center; z-index: 10;
  }
  .brand {
    font-size: 12px; letter-spacing: 3px; color: var(--muted);
    text-transform: uppercase; font-weight: 400;
  }
  .progress-text {
    font-size: 12px; color: var(--muted); font-style: italic;
    letter-spacing: 1px;
  }
  .progress-bar {
    position: fixed; top: 68px; left: 40px; right: 40px;
    height: 1px; background: #1a1a1a; z-index: 10;
  }
  .progress-bar-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 500ms cubic-bezier(.2,.8,.2,1);
  }

  /* main */
  .stage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 120px 40px 80px;
  }
  .card {
    width: 100%; max-width: 620px;
    opacity: 0; transform: translateY(14px);
    animation: rise 500ms cubic-bezier(.2,.8,.2,1) forwards;
  }
  .card.leaving {
    animation: fall 260ms cubic-bezier(.4,.0,.8,.3) forwards;
  }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
  @keyframes fall { to { opacity: 0; transform: translateY(-10px); } }

  .qnum {
    color: var(--muted); font-size: 12px; letter-spacing: 2.5px;
    text-transform: uppercase; margin-bottom: 24px; font-style: italic;
    font-weight: 400;
  }
  .question {
    font-size: 26px;
    line-height: 1.45;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 40px;
    color: var(--fg-soft);
  }

  /* choices */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    background: var(--card); border: 1px solid var(--border);
    padding: 16px 22px; border-radius: 4px;
    color: var(--fg-soft); font-family: inherit; font-size: 16px;
    font-weight: 400; letter-spacing: -0.005em;
    text-align: left; cursor: pointer;
    transition: all 180ms ease;
    display: flex; align-items: center; gap: 16px;
  }
  .choice:hover {
    border-color: var(--accent); background: #18160f;
    transform: translateX(3px);
  }
  .choice .letter {
    color: var(--accent); font-style: italic; font-size: 13px;
    width: 14px; font-weight: 400;
  }
  .choice.selected {
    border-color: var(--accent); background: #18160f;
  }

  /* slider */
  .slider-wrap { margin-top: 14px; }
  .slider-labels {
    display: flex; justify-content: space-between;
    color: var(--muted); font-size: 13px; font-style: italic;
    margin-bottom: 20px; letter-spacing: 0.3px;
  }
  .slider {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 1px; background: #262626; outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .slider::-moz-range-thumb {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: 3px solid var(--bg);
  }
  .slider-value {
    text-align: center; font-size: 40px; color: var(--accent);
    margin-top: 24px; font-weight: 400;
  }

  /* textarea */
  .text-input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--fg); font-family: 'Lora', serif;
    font-size: 18px; font-weight: 400;
    letter-spacing: -0.005em;
    padding: 14px 2px; resize: none; outline: none;
    line-height: 1.65; min-height: 110px;
    transition: border-color 200ms ease;
  }
  .text-input:focus { border-bottom-color: var(--accent); }
  .text-input::placeholder { color: #454036; font-style: italic; font-weight: 400; }

  /* continue */
  .actions { margin-top: 34px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; }
  .hint { color: var(--muted); font-size: 12px; font-style: italic; letter-spacing: 0.3px; }
  .continue-btn {
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent);
    padding: 9px 24px; border-radius: 3px;
    font-family: inherit; font-size: 14px;
    font-weight: 400; letter-spacing: 0.5px;
    cursor: pointer; transition: all 180ms ease;
  }
  .continue-btn:hover { background: var(--accent); color: var(--bg); }
  .continue-btn:disabled {
    opacity: 0.3; cursor: not-allowed; border-color: var(--muted); color: var(--muted);
  }
  .continue-btn:disabled:hover { background: transparent; color: var(--muted); }

  /* final */
  .final { text-align: center; }
  .final .big {
    font-size: 38px; font-style: italic; color: var(--accent);
    margin-bottom: 16px; font-weight: 400; letter-spacing: -0.01em;
  }
  .final .sub {
    color: var(--muted); font-size: 15px; line-height: 1.7;
    letter-spacing: 0.2px;
  }
  .loader {
    display: inline-block; width: 26px; height: 26px;
    border: 1px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 800ms linear infinite; margin-top: 26px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="progress-wrap">
  <div class="brand">MeSync</div>
  <div class="progress-text" id="progressText">1 of 8</div>
</div>
<div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>

<div class="stage">
  <div class="card" id="card"></div>
</div>

<script>
const QUESTIONS = [
  {
    id: "q1",
    type: "choice",
    text: "When you walk into a room full of strangers, you…",
    options: [
      { label: "Look for the loudest group and join in", value: 5 },
      { label: "Strike up a chat with whoever's closest", value: 4 },
      { label: "Wait for someone to approach first", value: 3 },
      { label: "Find a quiet corner and observe", value: 2 },
      { label: "Regret showing up in the first place", value: 1 },
    ],
  },
  {
    id: "q2",
    type: "choice",
    text: "A friend cancels plans at the last minute. Your first thought is…",
    options: [
      { label: "No worries, they must have a reason", value: 5 },
      { label: "Mildly annoyed but I get it", value: 4 },
      { label: "Fine — but I'll remember this", value: 3 },
      { label: "Why does this always happen to me?", value: 2 },
      { label: "Something must be wrong with me", value: 1 },
    ],
  },
  {
    id: "q3",
    type: "choice",
    text: "You have a completely free Saturday. You'd rather…",
    options: [
      { label: "Go somewhere you've never been before", value: 5 },
      { label: "Try a new restaurant or activity nearby", value: 4 },
      { label: "Do something familiar but with friends", value: 3 },
      { label: "Stick to your usual routine", value: 2 },
      { label: "Nothing — plans are exhausting", value: 1 },
    ],
  },
  {
    id: "q4",
    type: "choice",
    text: "Your desk or workspace right now looks…",
    options: [
      { label: "Immaculate. A place for everything.", value: 5 },
      { label: "Mostly tidy with a few piles", value: 4 },
      { label: "Organized chaos — I know where things are", value: 3 },
      { label: "A mess, but I'll clean it eventually", value: 2 },
      { label: "I'd rather not talk about it", value: 1 },
    ],
  },
  {
    id: "q5",
    type: "slider",
    text: "How often do you find yourself overthinking decisions?",
    min: 1, max: 10,
    leftLabel: "Rarely",
    rightLabel: "Constantly",
  },
  {
    id: "q6",
    type: "text",
    text: "What's a belief you hold that most people around you disagree with?",
    placeholder: "Be honest. This stays between us.",
  },
  {
    id: "q7",
    type: "text",
    text: "Describe a recent decision you're still second-guessing. What made it hard?",
    placeholder: "Walk me through it in your own words…",
  },
  {
    id: "q8",
    type: "text",
    text: "If you could send one sentence to yourself five years from now, what would it say?",
    placeholder: "One sentence. The one that matters.",
  },
];

let current = 0;
const answers = {};
const questionTextMap = {};
QUESTIONS.forEach(q => questionTextMap[q.id] = q.text);

const card = document.getElementById("card");
const progressText = document.getElementById("progressText");
const progressFill = document.getElementById("progressFill");

function updateProgress() {
  progressText.textContent = `${current + 1} of ${QUESTIONS.length}`;
  progressFill.style.width = `${(current / QUESTIONS.length) * 100}%`;
}

function renderQuestion() {
  const q = QUESTIONS[current];
  updateProgress();
  card.className = "card";
  card.innerHTML = `
    <div class="qnum">Question ${current + 1}</div>
    <div class="question">${q.text}</div>
    <div id="answerZone"></div>
  `;
  const zone = document.getElementById("answerZone");

  if (q.type === "choice") renderChoices(zone, q);
  else if (q.type === "slider") renderSlider(zone, q);
  else if (q.type === "text") renderTextInput(zone, q);
}

function renderChoices(zone, q) {
  const letters = ["A", "B", "C", "D", "E"];
  zone.innerHTML = `<div class="choices">` +
    q.options.map((opt, i) =>
      `<button class="choice" data-value="${opt.value}">
         <span class="letter">${letters[i]}</span>
         <span>${opt.label}</span>
       </button>`
    ).join("") + `</div>`;

  zone.querySelectorAll(".choice").forEach(btn => {
    btn.addEventListener("click", () => {
      zone.querySelectorAll(".choice").forEach(c => c.classList.remove("selected"));
      btn.classList.add("selected");
      answers[q.id] = parseInt(btn.dataset.value);
      setTimeout(advance, 260);
    });
  });
}

function renderSlider(zone, q) {
  const mid = Math.ceil((q.min + q.max) / 2);
  zone.innerHTML = `
    <div class="slider-wrap">
      <div class="slider-labels">
        <span>${q.leftLabel}</span>
        <span>${q.rightLabel}</span>
      </div>
      <input type="range" min="${q.min}" max="${q.max}" value="${mid}" class="slider" id="slider"/>
      <div class="slider-value" id="sliderValue">${mid}</div>
    </div>
    <div class="actions">
      <button class="continue-btn" id="continueBtn">Continue →</button>
    </div>
  `;
  const slider = document.getElementById("slider");
  const val = document.getElementById("sliderValue");
  slider.addEventListener("input", () => { val.textContent = slider.value; });
  document.getElementById("continueBtn").addEventListener("click", () => {
    answers[q.id] = parseInt(slider.value);
    advance();
  });
}

function renderTextInput(zone, q) {
  zone.innerHTML = `
    <textarea class="text-input" id="textInput" placeholder="${q.placeholder}" rows="3"></textarea>
    <div class="actions">
      <span class="hint">Take your time.</span>
      <button class="continue-btn" id="continueBtn" disabled>Continue →</button>
    </div>
  `;
  const input = document.getElementById("textInput");
  const btn = document.getElementById("continueBtn");
  input.focus();
  input.addEventListener("input", () => {
    btn.disabled = input.value.trim().length < 3;
  });
  btn.addEventListener("click", () => {
    answers[q.id] = input.value.trim();
    advance();
  });
}

function advance() {
  card.classList.add("leaving");
  setTimeout(() => {
    current++;
    if (current >= QUESTIONS.length) submit();
    else renderQuestion();
  }, 280);
}

function submit() {
  progressFill.style.width = "100%";
  progressText.textContent = "Done";
  card.className = "card final";
  card.innerHTML = `
    <div class="big">Building your twin…</div>
    <div class="sub">We're mapping your patterns. This will only take a moment.</div>
    <div class="loader"></div>
  `;
  fetch("/onboarding/submit", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ answers, questions: questionTextMap }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.redirect) {
      setTimeout(() => { window.location.href = data.redirect; }, 1000);
    }
  })
  .catch(err => {
    card.innerHTML = `<div class="big">Something went wrong.</div><div class="sub">${err}</div>`;
  });
}

renderQuestion();
</script>
</body>
</html>
